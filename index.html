<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light only">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CourseCalc">
<title>DBSC CourseCalc</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
:root{
  --paper:#F7FAFC; --ink:#12283A; --ink2:#48627A; --rule:#D6E2EB; --zebra:#EEF4F8;
  --port:#C8102E; --stbd:#007A33; --start:#FF6A13; --buoyY:#F2C230;
  --card:#FFFFFF;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--paper);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  padding:env(safe-area-inset-top) 10px calc(env(safe-area-inset-bottom) + 24px)}
.mono{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-variant-numeric:tabular-nums}
header{padding:12px 14px 10px;background:#FFF6D0;border-radius:12px;margin:6px 0 10px}
.notes{background:#FFF6D0;border-radius:12px;padding:10px 14px;margin:10px 0}
.legpanel{background:#FFF6D0;border-radius:12px;padding:12px 14px;margin:10px 0}
input[type=range]{-webkit-appearance:none;appearance:none;height:34px;background:transparent}
input[type=range]::-webkit-slider-runnable-track{height:6px;border-radius:3px;background:#C9D6DF}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:28px;height:28px;border-radius:50%;background:#12283A;margin-top:-11px;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.legpanel .leginfo{padding-top:2px;grid-template-columns:repeat(2,1fr);gap:10px 20px;font-size:12.5px;line-height:1.35}
.legpanel .leginfo, .legpanel .leginfo *{color:#111}
.legpanel .leginfo b{color:#000;font-size:16.5px}
.legpanel .why{grid-column:1/-1;margin:2px 0 4px}
.legpanel .why div{margin:3px 0;font-size:13px;line-height:1.45;color:#0E6074}
.legpanel .why .whyhead{font-weight:800;font-size:13.5px}
.legpanel .roundline{grid-column:1/-1;font-weight:700;font-size:14px;line-height:1.45;margin:4px 0 2px}
.notes summary{font-weight:800;color:#111;cursor:pointer;font-size:14px}
.notes .note, .notes .note *{color:#111 !important}
.notes .note .warn{font-weight:700}
header,header .eyebrow,header h1,header small{color:#111 !important}
:root{color-scheme:light}
.eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink2);font-weight:600}
h1{margin:2px 0 0;font-size:22px;font-weight:800;letter-spacing:-.01em}
h1 small{font-weight:600;color:var(--ink2);font-size:14px}
.card{background:var(--card);border:1px solid var(--rule);border-radius:14px;padding:14px;margin:10px 0}
label{display:block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink2);font-weight:700;margin-bottom:4px}
.inrow{display:flex;gap:10px}
.inrow>div{min-width:0}
input[type=date],input[type=time]{font-size:19px;padding:12px 4px;text-align:center;-webkit-appearance:none;appearance:none}
.inrow>div{flex:1}
input[type=number],input[type=date],input[type=time]{width:100%;font-size:24px;font-weight:700;padding:10px 8px;border:1.5px solid var(--rule);box-sizing:border-box;min-width:0;
  border-radius:10px;background:#FBFDFE;color:var(--ink);text-align:center;
  font-family:ui-monospace,"SF Mono",Menlo,monospace;font-variant-numeric:tabular-nums}
input[type=number]:focus,input[type=date]:focus,input[type=time]:focus{outline:none;border-color:var(--ink)}
.letters{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-top:4px}
.numbtns{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-top:4px}
.cardbtns{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:4px}
.legbtns{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:4px}
button.pick{min-height:44px;border:1.5px solid var(--rule);background:#FBFDFE;border-radius:10px;
  font-size:16px;font-weight:700;color:var(--ink);padding:0}
button.pick.on{background:var(--ink);color:#fff;border-color:var(--ink)}
button.pick.sug{border-color:var(--start);box-shadow:inset 0 0 0 1px var(--start)}
.hint{font-size:12px;color:var(--ink2);margin-top:6px}
.badge{display:flex;align-items:baseline;gap:12px;padding:4px 2px 0}
.badge .big{font-size:46px;font-weight:800;letter-spacing:-.02em}
.badge .sub{font-size:13px;color:var(--ink2);line-height:1.35}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2);
  text-align:left;padding:6px 4px;border-bottom:1.5px solid var(--ink)}
td{padding:7px 3px;border-bottom:1px solid var(--rule);vertical-align:middle;font-size:13.5px;line-height:1.35}
tr:nth-child(even) td{background:var(--zebra)}
.mk{display:flex;align-items:center;gap:5px;font-weight:700;flex-wrap:wrap;line-height:1.15;font-size:12.5px}
.mk3{display:flex;flex-direction:column;align-items:flex-start;gap:2px;font-weight:700;line-height:1.15;font-size:12.5px}
.mk3 .mkrow{display:flex;align-items:center;gap:5px}
.mk.cv{color:var(--start);font-weight:800;font-size:13px}
.mkl{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:11px;font-weight:800;color:var(--ink2);
  border:1.2px solid var(--rule);border-radius:5px;padding:1px 5px;background:#FBFDFE}
.chip{width:11px;height:18px;border-radius:3px;border:1px solid rgba(0,0,0,.25);flex:none;overflow:hidden;display:flex;flex-direction:column}
.chip i{flex:1}
.rp{color:var(--port);font-weight:800}
.rs{color:var(--stbd);font-weight:800}
.sail{display:inline-block;padding:2px 7px;border-radius:6px;background:var(--ink);color:#fff;font-weight:700;font-size:12px}
.sail.gust{background:var(--start)}
.pos{font-size:11px;color:var(--ink2);text-transform:uppercase;letter-spacing:.06em}
.tot{display:flex;gap:18px;flex-wrap:wrap;padding-top:10px;font-size:13px;color:var(--ink2)}
.tiderow{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.tiderow .tev{flex:1;min-width:70px;background:var(--zebra);border-radius:9px;padding:7px 6px;text-align:center}
.tiderow .tev b{display:block;font-size:16px}
.tiderow .tev.hw b{color:var(--ink)} .tiderow .tev.lw b{color:var(--ink2)}
.tiderow .tev span{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2)}
.tidenow{margin-top:9px;font-size:13.5px;color:var(--ink)}
.leginfo{display:grid;grid-template-columns:repeat(3,auto);justify-content:space-between;gap:2px 8px;font-size:11.5px;padding-top:6px;line-height:1.25}
.leginfo b{font-size:13.5px;white-space:nowrap}
.leginfo .span{grid-column:1/-1}
.tidenow b{font-size:15px}
.tot b{color:var(--ink);font-size:17px}
svg{display:block;width:100%;height:auto;border:1px solid var(--rule);border-radius:12px;background:#F2F7FA}
.note{font-size:11.5px;color:var(--ink2);line-height:1.45;margin-top:10px}
.warn{color:var(--port);font-weight:600}
</style>
</head>
<body>
<header>
  <div class="eyebrow" id="eyebrow">Dublin Bay SC</div>
  <h1>CourseCalc <small>2026 card v1</small></h1>
</header>

<details class="notes" id="setuptab" open style="background:var(--card);border:1px solid var(--rule)"><summary>Setup</summary>
  <div style="margin-bottom:12px;margin-top:4px"><label>Boat</label>
    <div class="cardbtns" id="boatbtns" style="grid-template-columns:repeat(3,1fr)"></div>
  </div>
  <div style="margin-bottom:12px"><label>Course card</label>
    <div class="cardbtns" id="cardbtns"></div>
  </div>
  <div class="inrow" style="margin-bottom:12px">
    <div style="flex:1.4"><label>Race date</label><input id="rdate" type="date"></div>
    <div><label>Start time</label><input id="rtime" type="time" value="19:00"></div>
  </div>
  <div class="inrow">
    <div><label>Wind °T</label><input id="wdir" type="number" inputmode="numeric" value="0" min="0" max="359"></div>
    <div><label>Wind kt</label><input id="wspd" type="number" inputmode="numeric" value="10" min="0" max="40"></div>
    <div><label>Gusts kt</label><input id="wgst" type="number" inputmode="numeric" value="15" min="0" max="50"></div>
  </div>
  <div style="margin-top:12px"><label>Course letter <span id="sugTxt" style="text-transform:none;letter-spacing:0;font-weight:500"></span></label>
    <div class="letters" id="letters"></div>
  </div>
  <div style="margin-top:12px"><label>Course number</label>
    <div class="numbtns" id="nums"></div>
  </div>
</details>

<script>
"use strict";
</script>
</body>
</html>
